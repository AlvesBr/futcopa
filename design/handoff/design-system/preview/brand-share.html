<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--ink-200); padding: 20px; font-family: var(--font-ui); }
  .cap { font: var(--t-label); text-transform: uppercase; letter-spacing: var(--tracking-label); color: var(--fg-2); margin: 0 0 14px; }
  .share { position: relative; border-radius: var(--r-xl); overflow: hidden; background: var(--grad-festival); padding: 22px 24px; box-shadow: var(--sh-4); color: #fff; }
  .share::before { content: ""; position: absolute; inset: 0; background: url("../assets/pattern-confetti.svg"); background-size: 150px; opacity: .22; }
  .share > * { position: relative; }
  .wm { font-family: var(--font-display); text-transform: uppercase; font-size: 22px; letter-spacing: .02em; }
  .score { font-family: var(--font-display); font-size: 60px; line-height: .9; text-shadow: 0 2px 10px rgba(0,0,0,.25); }
  .msg { font: var(--t-body); font-weight: 700; opacity: .95; }
  .grid { display: flex; flex-direction: column; gap: 4px; margin-top: 12px; font-size: 18px; line-height: 1; }
</style>
</head>
<body>
  <div class="cap">Shareable result surface</div>
  <div class="share">
    <div class="wm">FUTCOPA · #128</div>
    <div class="score">7/10</div>
    <div class="msg">Mandou bem! 🏆 · Sequência 4 🔥</div>
    <div class="grid">
      <div>🟩</div>
      <div>🟩 🟨</div>
      <div>🟩 🟥 🟩</div>
      <div>🟩 🟩 🟨 🟩</div>
    </div>
  </div>
</body>
</html>
