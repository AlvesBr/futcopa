<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg); padding: 22px 24px; font-family: var(--font-ui); }
  .cap { font: var(--t-label); text-transform: uppercase; letter-spacing: var(--tracking-label); color: var(--fg-2); margin: 0 0 16px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .pc { display: flex; align-items: center; gap: 11px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); box-shadow: var(--sh-2); padding: 9px 14px 9px 9px; }
  .pc.active { border-color: var(--grass-500); box-shadow: var(--glow-grass); }
  .av { width: 46px; height: 46px; border-radius: var(--r-sm); display: grid; place-items: center; font-weight: 800; color: #fff; font-size: 15px; position: relative; }
  .av .flag { position: absolute; bottom: -3px; right: -4px; font-size: 17px; filter: drop-shadow(0 1px 1px rgba(0,0,0,.3)); }
  .nm { font: var(--t-body); font-weight: 700; color: var(--fg); }
  .co { font: var(--t-caption); color: var(--fg-3); }
  .lv { margin-left: 4px; font: var(--t-caption); font-weight: 700; color: var(--cyan-800); background: var(--cyan-100); padding: 3px 8px; border-radius: var(--r-pill); }
</style>
</head>
<body>
  <div class="cap">PlayerCard — flag + initials avatar</div>
  <div class="row">
    <div class="pc active">
      <div class="av" style="background:linear-gradient(135deg,#08b65a,#06934a)">MB<span class="flag">🇫🇷</span></div>
      <div><div class="nm">Mbappé</div><div class="co">França · ativo</div></div>
    </div>
    <div class="pc">
      <div class="av" style="background:linear-gradient(135deg,#15b8e8,#0a93bd)">LM<span class="flag">🇦🇷</span></div>
      <div><div class="nm">Messi <span class="lv">📍 Nível 1</span></div><div class="co">Argentina</div></div>
    </div>
  </div>
</body>
</html>
