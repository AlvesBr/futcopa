<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--ink-200); padding: 22px 24px; font-family: var(--font-ui); }
  .cap { font: var(--t-label); text-transform: uppercase; letter-spacing: var(--tracking-label); color: var(--fg-2); margin: 0 0 16px; }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .toast { display: inline-flex; align-items: center; gap: 9px; background: var(--ink-900); color: #fff; padding: 11px 16px; border-radius: var(--r-pill); box-shadow: var(--sh-3); font: var(--t-body-sm); font-weight: 700; }
  .toast .ic { display: grid; place-items: center; }
  .cd { display: inline-flex; flex-direction: column; gap: 2px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 10px 16px; box-shadow: var(--sh-2); }
  .cd .lab { font: var(--t-caption); text-transform: uppercase; letter-spacing: .06em; color: var(--fg-3); }
  .cd .clk { font-family: var(--font-mono); font-weight: 700; font-size: 22px; color: var(--grass-600); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="cap">Toast &amp; countdown</div>
  <div class="row">
    <div class="toast"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#1bcb6c"/><path d="M7 12.5l3 3 6-7" fill="none" stroke="#07120d" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Copiado!</div>
    <div class="cd"><span class="lab">Próximo desafio em</span><span class="clk">12:47:03</span></div>
  </div>
</body>
</html>
