<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--ink-950); padding: 22px 24px; font-family: var(--font-ui); }
  .cap { font: var(--t-label); text-transform: uppercase; letter-spacing: var(--tracking-label); color: var(--ink-300); margin: 0 0 14px; }
  .clock { font-family: var(--font-mono); font-weight: 700; font-variant-numeric: tabular-nums; color: #9bd933; font-size: 46px; letter-spacing: .04em; }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); margin-top: 6px; }
  .chips { display: flex; gap: 8px; margin-top: 16px; }
  .chip { font-family: var(--font-mono); font-weight: 700; font-size: 13px; color: var(--gold-400); background: rgba(255,194,30,.14); border: none; padding: 6px 11px; border-radius: var(--r-sm); }
</style>
</head>
<body>
  <div class="cap">Scoreboard mono · Space Mono</div>
  <div class="clock">12:47:03</div>
  <div class="lab">Próximo desafio · countdown &amp; tabular figures</div>
  <div class="chips"><span class="chip">7/10</span><span class="chip">🔥 4</span><span class="chip">#128</span></div>
</body>
</html>
