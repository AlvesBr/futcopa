<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--bg); padding: 22px 24px; }
  .cap { font: var(--t-label); text-transform: uppercase; letter-spacing: var(--tracking-label); color: var(--fg-2); margin: 0 2px 12px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .ac { border-radius: var(--r-md); height: 104px; box-shadow: var(--sh-2); padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; }
  .ac .name { font: var(--t-h3); }
  .ac .hex { font-family: var(--font-mono); font-size: 11px; font-weight: 700; opacity: .85; }
</style>
</head>
<body>
  <div class="cap">Festival accents</div>
  <div class="grid">
    <div class="ac" style="background:var(--gold-400)"><div class="name" style="color:#2a1c00">Gold</div><div class="hex" style="color:#2a1c00">#ffc21e · secondary</div></div>
    <div class="ac" style="background:var(--magenta-500)"><div class="name" style="color:#fff">Magenta</div><div class="hex" style="color:#ffd6e2">#ff2e63 · accent</div></div>
    <div class="ac" style="background:var(--cyan-500)"><div class="name" style="color:#06283a">Cyan</div><div class="hex" style="color:#06283a">#15b8e8 · accent</div></div>
  </div>
</body>
</html>
