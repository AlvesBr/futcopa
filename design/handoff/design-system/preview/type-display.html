<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg); padding: 20px 24px; }
  .cap { font: var(--t-label); font-family: var(--font-ui); text-transform: uppercase; letter-spacing: var(--tracking-label); color: var(--fg-2); margin: 0 0 6px; }
  .big { font-family: var(--font-display); font-weight: 700; text-transform: uppercase; color: var(--fg); line-height: .9; letter-spacing: -.01em; margin: 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 8px; }
  .num { color: var(--grass-500); }
</style>
</head>
<body>
  <div class="cap">Display · Russo One</div>
  <div class="big" style="font-size:74px">FUTCOPA</div>
  <div class="big" style="font-size:52px">Pódio do dia <span class="num">7/10</span></div>
  <div class="meta">Russo One 400 · UPPERCASE · wordmark, hero, big scores &amp; rank numbers</div>
</body>
</html>
