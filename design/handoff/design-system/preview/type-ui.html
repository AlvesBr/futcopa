<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg); padding: 20px 24px; font-family: var(--font-ui); }
  .cap { font: var(--t-label); text-transform: uppercase; letter-spacing: var(--tracking-label); color: var(--fg-2); margin: 0 0 14px; }
  .spec { display: flex; align-items: baseline; gap: 14px; margin-bottom: 11px; }
  .spec .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); width: 86px; flex: none; }
  .h1 { font: var(--t-h1); color: var(--fg); }
  .h2 { font: var(--t-h2); color: var(--fg); }
  .h3 { font: var(--t-h3); color: var(--fg); }
  .bl { font: var(--t-body-lg); color: var(--fg); }
  .b  { font: var(--t-body); color: var(--fg); }
  .bs { font: var(--t-body-sm); color: var(--fg-2); }
</style>
</head>
<body>
  <div class="cap">UI / Body · Hanken Grotesk</div>
  <div class="spec"><span class="lbl">h1 / 800</span><span class="h1">Mandou bem!</span></div>
  <div class="spec"><span class="lbl">h2 / 700</span><span class="h2">Categoria do dia</span></div>
  <div class="spec"><span class="lbl">h3 / 700</span><span class="h3">Como jogar</span></div>
  <div class="spec"><span class="lbl">body-lg / 500</span><span class="bl">Arraste os jogadores para a pirâmide.</span></div>
  <div class="spec"><span class="lbl">body / 500</span><span class="b">O topo é o maior valor; a base, o menor.</span></div>
  <div class="spec"><span class="lbl">body-sm / 500</span><span class="bs">Uma dica revela o nível certo de 1 jogador.</span></div>
</body>
</html>
