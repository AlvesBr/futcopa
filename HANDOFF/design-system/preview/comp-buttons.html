<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg); padding: 22px 24px; font-family: var(--font-ui); }
  .cap { font: var(--t-label); text-transform: uppercase; letter-spacing: var(--tracking-label); color: var(--fg-2); margin: 0 0 16px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .btn { font: var(--t-body); font-weight: 700; border: none; border-radius: var(--r-pill); padding: 13px 22px; cursor: pointer; min-height: 46px; display: inline-flex; align-items: center; gap: 8px; }
  .primary { background: var(--primary); color: var(--on-primary); box-shadow: var(--glow-grass); }
  .primary.hover { background: var(--primary-hover); }
  .primary.press { background: var(--primary-press); transform: scale(.97); box-shadow: var(--sh-1); }
  .secondary { background: var(--surface); color: var(--fg); border: 1.5px solid var(--border-strong); }
  .ghost { background: transparent; color: var(--grass-600); }
  .gold { background: var(--gold-400); color: var(--fg-on-gold); box-shadow: var(--glow-gold); }
  .tag { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); text-transform: uppercase; letter-spacing: .08em; }
</style>
</head>
<body>
  <div class="cap">Buttons</div>
  <div class="row">
    <button class="btn primary">Jogar agora</button>
    <button class="btn primary hover">Hover</button>
    <button class="btn primary press">Press</button>
    <span class="tag">primary · glow + scale 0.97 on press</span>
  </div>
  <div class="row">
    <button class="btn secondary">Como jogar</button>
    <button class="btn ghost">Pular</button>
    <button class="btn gold">🏆 Compartilhar</button>
  </div>
</body>
</html>
