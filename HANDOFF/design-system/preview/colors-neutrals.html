<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--bg); padding: 22px 24px; }
  .cap { font: var(--t-label); text-transform: uppercase; letter-spacing: var(--tracking-label); color: var(--fg-2); margin: 0 2px 12px; }
  .row { display: flex; gap: 0; border-radius: var(--r-md); overflow: hidden; box-shadow: var(--sh-2); }
  .sw { flex: 1; height: 84px; display: flex; align-items: flex-end; padding: 8px 8px; }
  .sw b { font-family: var(--font-mono); font-size: 11px; font-weight: 700; }
</style>
</head>
<body>
  <div class="cap">Neutrals · Green Ink</div>
  <div class="row">
    <div class="sw" style="background:var(--ink-50)"><b style="color:#07210f">50</b></div>
    <div class="sw" style="background:var(--ink-100)"><b style="color:#07210f">100</b></div>
    <div class="sw" style="background:var(--ink-200)"><b style="color:#07210f">200</b></div>
    <div class="sw" style="background:var(--ink-300)"><b style="color:#07210f">300</b></div>
    <div class="sw" style="background:var(--ink-400)"><b style="color:#fff">400</b></div>
    <div class="sw" style="background:var(--ink-500)"><b style="color:#fff">500</b></div>
    <div class="sw" style="background:var(--ink-700)"><b style="color:#fff">700</b></div>
    <div class="sw" style="background:var(--ink-900)"><b style="color:#fff">900</b></div>
    <div class="sw" style="background:var(--ink-950)"><b style="color:#fff">950</b></div>
  </div>
</body>
</html>
