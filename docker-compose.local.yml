version: '3.8'

# Local Supabase-compatible stack using standard Docker Hub images
# Usage:  docker compose -f docker-compose.local.yml up -d
# Studio: http://localhost:54323  (pgweb)
# API:    http://localhost:54321

services:
  db:
    image: postgres:15
    container_name: futcopa_db
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - futcopa_db_data:/var/lib/postgresql/data
      - ./supabase/roles.sql:/docker-entrypoint-initdb.d/00_roles.sql:ro
      - ./supabase/migrations/20260605000001_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./supabase/grants.sql:/docker-entrypoint-initdb.d/02_grants.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rest:
    image: postgrest/postgrest:v12.2.0
    container_name: futcopa_rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:postgres@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      PGRST_DB_EXTRA_SEARCH_PATH: public
      PGRST_SERVER_PORT: "3000"

  api:
    image: nginx:alpine
    container_name: futcopa_api
    restart: unless-stopped
    depends_on:
      - rest
    ports:
      - "54321:80"
    volumes:
      - ./supabase/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  pgweb:
    image: sosedoff/pgweb
    container_name: futcopa_studio
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "54323:8081"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/postgres?sslmode=disable

volumes:
  futcopa_db_data:
